<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>80% of Qur'anic Words</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#0D7377; --dark-teal:#0A5C5E; --gold:#C49A2B; --deep-gold:#A8841F;
  --cream:#FFF8E7; --dark-bg:#1A3636; --light-teal:#E0F2F1;
  --green:#2E7D32; --red:#C62828; --fs:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'IBM Plex Sans',sans-serif;background:#f0f4f4;color:#333;min-height:100vh;font-size:var(--fs);}
.arabic{font-family:'Amiri','Traditional Arabic',serif;direction:rtl;line-height:1.8;}

/* NAV */
.nav-bar{position:sticky;top:0;z-index:100;background:var(--dark-bg);display:flex;overflow-x:auto;gap:2px;padding:8px 8px 0;scrollbar-width:none;}
.nav-bar::-webkit-scrollbar{display:none;}
.nav-tab{flex-shrink:0;padding:10px 14px;background:rgba(255,255,255,0.08);color:#88BBBB;border:none;cursor:pointer;border-radius:10px 10px 0 0;font-size:13px;font-weight:500;transition:all 0.2s;white-space:nowrap;}
.nav-tab.active{background:var(--gold);color:white;font-weight:700;}

.app{max-width:540px;margin:0 auto;padding:14px 13px 80px;}

/* HERO with Quran bg */
.hero{border-radius:18px;overflow:hidden;margin-bottom:14px;position:relative;}
.hero-bg{
  background: linear-gradient(rgba(10,30,30,0.82), rgba(10,30,30,0.88)),
    url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/27/Quran_okela.jpg/800px-Quran_okela.jpg') center/cover no-repeat;
  padding:36px 22px 28px;
  text-align:center;
}
.hero-bismillah{font-family:'Amiri',serif;color:var(--gold);font-size:28px;direction:rtl;margin-bottom:10px;}
.hero h1{color:white;font-size:22px;font-weight:700;margin-bottom:6px;}
.hero .sub{color:#88BBBB;font-size:14px;line-height:1.6;}

/* SLIDES */
.slide-wrap{position:relative;}
.slide{
  border-radius:16px;overflow:hidden;margin-bottom:10px;
  background:linear-gradient(rgba(10,30,30,0.87),rgba(10,30,30,0.92)),
    url('https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Koran_x.jpg/800px-Koran_x.jpg') center/cover no-repeat;
  padding:28px 20px;min-height:190px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
}
.slide-nav{display:flex;gap:10px;justify-content:center;margin-top:8px;}
.slide-nav button{padding:10px 22px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;}
.slide-nav .prev{background:#eee;color:#555;}
.slide-nav .next{background:var(--gold);color:white;}
.slide-nav button:disabled{opacity:0.35;cursor:default;}
.slide-dots{display:flex;gap:5px;justify-content:center;margin-top:8px;}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc;transition:all 0.2s;}
.dot.active{background:var(--gold);width:20px;border-radius:4px;}

/* CARDS */
.card{background:white;border-radius:14px;padding:16px;margin-bottom:10px;border-left:4px solid var(--gold);}
.card.teal{border-left-color:var(--teal);}
.card h3{color:var(--dark-teal);font-size:15px;font-weight:700;margin-bottom:8px;}
.card p{color:#555;font-size:14px;line-height:1.75;}

/* STAT BOXES */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;}
.stat-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%;}
.sbox{background:rgba(255,255,255,0.08);border-radius:10px;padding:12px 6px;text-align:center;}
.sbox .n{color:var(--gold);font-size:19px;font-weight:700;line-height:1.2;}
.sbox .l{color:#88BBBB;font-size:11px;margin-top:3px;line-height:1.4;}

/* DAY TAB */
.day-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px;}
.day-btn{padding:10px 4px;border:2px solid #ddd;border-radius:10px;background:white;cursor:pointer;text-align:center;font-size:13px;color:#666;font-weight:500;transition:all 0.2s;}
.day-btn.active{border-color:var(--teal);background:var(--teal);color:white;font-weight:700;}
.day-words-card{
  border-radius:14px;padding:16px;margin-bottom:12px;
  background:linear-gradient(rgba(255,248,231,0.97),rgba(255,248,231,0.97)),
    url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/27/Quran_okela.jpg/800px-Quran_okela.jpg') center/cover;
  border:2px solid var(--gold);
}
.word-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(196,154,43,0.2);}
.word-row:last-child{border-bottom:none;}
.word-row .eng{font-size:14px;color:#333;}
.word-row .translit{font-size:12px;color:#aaa;margin-left:4px;font-style:italic;}
.word-row .arb{font-family:'Amiri',serif;font-size:26px;color:var(--teal);direction:rtl;}
.day-actions{display:flex;gap:10px;}
.day-actions button{flex:1;padding:13px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;}
.day-actions .quiz-day{background:var(--teal);color:white;}
.day-actions .flash-day{background:var(--gold);color:white;}

/* LEARN */
.cat-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.cat-pill{padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:none;font-weight:500;background:#e8f0f0;color:var(--teal);transition:all 0.15s;}
.cat-pill.active{background:var(--teal);color:white;font-weight:700;}
.browse-list{border-radius:10px;border:1px solid #e0e0e0;overflow:hidden;}
.browse-item{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid #f0f0f0;background:white;}
.browse-item:nth-child(even){background:#fafafa;}
.browse-item:last-child{border-bottom:none;}
.browse-item .eng-col{font-size:14px;color:#333;}
.browse-item .arb-col{font-family:'Amiri',serif;font-size:28px;color:var(--teal);direction:rtl;}

/* QUIZ */
.progress-bar{width:100%;height:5px;background:#e0e0e0;border-radius:3px;margin-bottom:12px;overflow:hidden;}
.progress-bar .fill{height:100%;background:var(--teal);border-radius:3px;transition:width 0.35s;}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.quiz-prompt{
  border-radius:14px;padding:32px 20px;text-align:center;margin-bottom:14px;
  background:linear-gradient(rgba(10,30,30,0.9),rgba(10,30,30,0.93)),
    url('https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Koran_x.jpg/800px-Koran_x.jpg') center/cover;
}
.quiz-prompt .qlabel{color:#88BBBB;font-size:12px;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.quiz-prompt .qword{color:var(--gold);font-size:40px;font-weight:700;line-height:1.4;}
.quiz-prompt .qword.eng{font-size:20px;direction:ltr;}
.quiz-prompt .qtranslit{color:#88BBBB;font-size:14px;font-style:italic;margin-top:6px;}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.option-btn{padding:16px 10px;border:2px solid #ddd;border-radius:12px;background:white;cursor:pointer;font-size:15px;color:#333;transition:all 0.2s;min-height:58px;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.4;}
.option-btn.arabic-opt{font-family:'Amiri',serif;font-size:28px;direction:rtl;color:var(--teal);}
.option-btn.correct{background:#E8F5E9;border-color:#4CAF50;color:var(--green);font-weight:700;}
.option-btn.wrong{background:#FFEBEE;border-color:#E53935;color:var(--red);}
.option-btn:disabled{cursor:default;}

/* FLASHCARD */
.flashcard{border-radius:18px;padding:48px 22px;text-align:center;cursor:pointer;min-height:230px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.3s;user-select:none;}
.flashcard.front{
  background:linear-gradient(rgba(10,30,30,0.88),rgba(10,30,30,0.92)),
    url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/27/Quran_okela.jpg/800px-Quran_okela.jpg') center/cover;
}
.flashcard.back{background:var(--cream);border:2px solid var(--gold);}
.flashcard .f-arabic{font-family:'Amiri',serif;color:var(--gold);font-size:52px;direction:rtl;margin-bottom:10px;line-height:1.4;}
.flashcard .f-hint{color:#88BBBB;font-size:14px;}
.flashcard .f-english{color:var(--dark-teal);font-size:26px;font-weight:700;margin-bottom:8px;}
.flashcard .f-translit{color:#888;font-size:14px;font-style:italic;}
.flashcard .f-freq{color:#aaa;font-size:13px;margin-top:6px;}
.flash-actions{display:flex;gap:10px;margin-top:12px;}
.flash-actions button{flex:1;padding:14px;border:none;border-radius:12px;cursor:pointer;font-size:15px;font-weight:700;}
.flash-actions .still{background:#FFEBEE;color:var(--red);}
.flash-actions .got{background:#E8F5E9;color:var(--green);}

/* RESULTS */
.results{text-align:center;padding:34px 16px;}
.results .emoji{font-size:56px;margin-bottom:10px;}
.results .sc{color:var(--teal);font-size:34px;font-weight:700;}
.results .msg{color:#666;font-size:15px;margin:6px 0 22px;line-height:1.6;}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn-primary{padding:13px 26px;background:var(--teal);color:white;border:none;border-radius:10px;cursor:pointer;font-size:15px;font-weight:700;}
.btn-secondary{padding:13px 26px;background:white;color:var(--teal);border:2px solid var(--teal);border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;}
.btn-back{width:100%;padding:13px;background:#eee;color:#666;border:none;border-radius:10px;cursor:pointer;font-size:14px;margin-top:12px;}

/* PICKER */
.cat-pick-grid{display:grid;gap:8px;}
.cat-pick-btn{padding:14px 16px;border-radius:12px;cursor:pointer;font-size:14px;font-weight:500;border:2px solid var(--teal);background:white;color:var(--dark-teal);text-align:left;transition:all 0.15s;display:flex;justify-content:space-between;align-items:center;}
.cat-pick-btn.gd{background:var(--gold);color:white;border-color:var(--gold);}
.cat-pick-btn .cnt{font-size:12px;color:#aaa;font-weight:400;}
.cat-pick-btn.gd .cnt{color:rgba(255,255,255,0.8);}
.mode-toggle{display:flex;gap:8px;margin-bottom:12px;}
.mode-btn{flex:1;padding:10px;border:2px solid #ddd;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;background:white;color:#555;}
.mode-btn.active{border-color:var(--teal);background:var(--teal);color:white;font-weight:700;}
.section-title{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px;}

/* MUQATTAAT */
.mq-card{background:white;border-radius:14px;padding:16px;margin-bottom:10px;border-left:4px solid var(--gold);box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.surah-pill{display:inline-block;background:#e8f0f0;color:var(--teal);border-radius:20px;padding:4px 11px;font-size:12px;margin:3px 3px 0 0;font-weight:500;}

/* AYAH CARD */
.ayah-card{
  border-radius:14px;padding:18px;margin-bottom:10px;
  background:linear-gradient(rgba(10,30,30,0.88),rgba(10,30,30,0.92)),
    url('https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Koran_x.jpg/800px-Koran_x.jpg') center/cover;
}
.ayah-arabic{font-family:'Amiri',serif;color:var(--gold);font-size:22px;direction:rtl;text-align:right;line-height:1.8;margin-bottom:10px;}
.ayah-translation{color:#ccc;font-size:13px;line-height:1.7;font-style:italic;}
.ayah-ref{color:var(--gold);font-size:12px;margin-top:6px;font-weight:600;}
</style>
</head>

</div>
<div class="app" id="app"></div>

  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  const app=document.getElementById('app');
  if(tab==="present"){app.innerHTML=renderPresent();}
  else if(tab==="days"){app.innerHTML=renderDays();}
  else if(tab==="learn"){app.innerHTML=renderLearn();}
  else if(tab==="muqattaat"){app.innerHTML=renderMuq();}
  else if(tab==="quiz"){renderQ(app);}
  else if(tab==="flash"){renderF(app);}
  bind();
}

// PRESENT
function renderPresent(){
  const s=slides[si];
  return `
    <div class="slide">${s.h}</div>
    <div class="slide-nav">
      <button class="prev" data-a="sp" ${si===0?'disabled':''}>◀ Prev</button>
      <span style="color:#888;font-size:14px;align-self:center">${si+1} / ${slides.length}</span>
      <button class="next" data-a="sn" ${si===slides.length-1?'disabled':''}>Next ▶</button>
    </div>
    <div class="slide-dots">${slides.map((_,i)=>`<div class="dot ${i===si?'active':''}"></div>`).join('')}</div>
    <div style="margin-top:14px">
      <div class="card teal">
        <h3>📊 At a Glance</h3>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px;text-align:center">
          <div><div style="color:var(--teal);font-size:20px;font-weight:700">${allWords.length}</div><div style="color:#888;font-size:11px">Words</div></div>
          <div><div style="color:var(--teal);font-size:20px;font-weight:700">${cats.length}</div><div style="color:#888;font-size:11px">Categories</div></div>
          <div><div style="color:var(--teal);font-size:20px;font-weight:700">${NUM_DAYS}</div><div style="color:#888;font-size:11px">Day Plan</div></div>
          <div><div style="color:var(--teal);font-size:20px;font-weight:700">14</div><div style="color:#888;font-size:11px">Muqaṭṭaʿāt</div></div>
        </div>
      </div>
      <div class="ayah-card">
        <div class="ayah-arabic arabic">خَيْرُكُمْ مَنْ تَعَلَّمَ الْقُرْآنَ وَعَلَّمَهُ</div>
        <p class="ayah-translation">"The best of you are those who learn the Quran and teach it."</p>
        <p class="ayah-ref">— Prophet Muhammad ﷺ · Ṣaḥīḥ al-Bukhārī</p>
      </div>
    </div>`;
}

// DAYS
function renderDays(){
  const words=getDay(sday);
  const rows=words.map(w=>`
    <div class="word-row">
      <div><span class="eng">${w.e}</span><span class="translit">(${w.t})</span></div>
      <span class="arb arabic">${w.a}</span>
    </div>`).join('');
  const btns=Array.from({length:NUM_DAYS},(_,i)=>i+1).map(d=>
    `<button class="day-btn ${d===sday?'active':''}" data-day="${d}">Day ${d}</button>`).join('');
  return `
    <div class="hero"><div class="hero-bg">
      <p class="hero-bismillah arabic">بِسْمِ اللّٰهِ</p>
      <h1 class="hero" style="color:white;font-size:18px;margin:4px 0">30-Day Vocabulary Plan</h1>
      <p class="sub">5 words · every day · click any day to start</p>
    </div></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <h3 style="color:var(--dark-teal);font-size:15px;font-weight:700">Choose a Day</h3>
      <span style="font-size:13px;color:#aaa">Day ${sday} selected</span>
    </div>
    <div class="day-grid">${btns}</div>
    <div class="day-words-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="color:var(--dark-teal);font-size:15px;font-weight:700">Day ${sday} — 5 Words</span>
        <span style="background:var(--gold);color:white;font-size:12px;padding:3px 12px;border-radius:12px">Day ${sday}</span>
      </div>
      ${rows}
    </div>
    <div class="day-actions">
      <button class="quiz-day" data-a="qday">📝 Quiz These</button>
      <button class="flash-day" data-a="fday">🔄 Flashcards</button>
    </div>`;
}

// LEARN
function renderLearn(){
  const pills=cats.map(c=>`<button class="cat-pill ${c===bcat?'active':''}" data-bc="${c}">${c}</button>`).join('');
  const items=allWords.filter(w=>w.c===bcat).map(w=>`
    <div class="browse-item">
      <div>
        <div class="eng-col">${w.e}</div>
        <div style="font-size:12px;color:#aaa;font-style:italic">${w.t}${w.f?` · ${w.f}× in Quran`:''}</div>
      </div>
      <span class="arb-col arabic">${w.a}</span>
    </div>`).join('');
  const cnt=allWords.filter(w=>w.c===bcat).length;
  return `
    <div style="background:white;border-radius:12px;padding:13px;margin-bottom:12px;border:1px solid #e0e0e0">
      <p style="font-size:12px;color:#888;margin-bottom:8px;font-weight:700">BROWSE BY CATEGORY — ${cnt} words</p>
      <div class="cat-pills">${pills}</div>
    </div>
    <div class="browse-list">${items}</div>`;
}

// MUQATTAAT
function renderMuq(){
  const cards=muqattaat.map(m=>`
    <div class="mq-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <p style="font-size:14px;font-weight:700;color:var(--dark-teal)">${m.n}</p>
          <p style="font-size:12px;color:#aaa;margin-top:2px">Appears in ${m.s.length} Surah${m.s.length>1?'s':''}</p>
        </div>
        <span class="arabic" style="font-size:34px;color:var(--gold);line-height:1.4">${m.a}</span>
      </div>
      <div>${m.s.map(s=>`<span class="surah-pill">${s.n}. ${s.nm}</span>`).join('')}</div>
    </div>`).join('');
  return `
    <div class="hero"><div class="hero-bg">
      <p class="arabic" style="color:var(--gold);font-size:26px;margin-bottom:6px">الحروف المقطعة</p>
      <p style="color:white;font-size:15px;font-weight:600;margin-bottom:4px">Ḥurūf Muqaṭṭaʿāt</p>
      <p style="color:#88BBBB;font-size:13px;line-height:1.7">The 14 "mysterious letters" opening 29 Surahs.<br>Allah alone knows their full meaning.</p>
    </div></div>
    <div class="card teal" style="margin-bottom:14px">
      <h3>📌 Key Facts</h3>
      <p>• Each letter earns <strong>10 rewards</strong> when recited (Tirmidhi)<br>
      • They open <strong>29 of 114</strong> Surahs<br>
      • Recited by letter name: Alif · Lam · Mim = 3 letters, 30 rewards<br>
      • They prove the miraculous nature of the Quran — Arabs knew these letters yet couldn't produce anything like it<br>
      • Scholars have 40+ opinions on their meaning; we believe in them and recite with full tawakkul</p>
    </div>
    ${cards}`;
}

// QUIZ
function startQ(words){
  const pool=shuffle(words).slice(0,Math.min(10,words.length));
  qst={questions:pool.map(w=>{
    const dir=qmode==="mixed"?(Math.random()>0.5?"ar2en":"en2ar"):qmode;
    return{word:w,options:shuffle([w,...shuffle(allWords.filter(x=>x.e!==w.e)).slice(0,3)]),dir};
  }),index:0,score:0,selected:null,finished:false};
  tab="quiz";render();
}
function renderQ(app){
  if(!qst.questions||!qst.questions.length){app.innerHTML=renderQHome();bind();return;}
  if(qst.finished){
    const pct=qst.score/qst.questions.length;
    app.innerHTML=`<div class="results">
      <div class="emoji">${pct>=0.8?"🌟":pct>=0.5?"👍":"📖"}</div>
      <div class="sc">${qst.score} / ${qst.questions.length}</div>
      <p class="msg">${pct>=0.8?"MashaAllah! Excellent work!":pct>=0.5?"Good effort — keep reviewing!":"Keep going, inshaAllah you'll get there!"}</p>
      <div class="btn-row">
        <button class="btn-primary" data-a="rq">Retry</button>
        <button class="btn-secondary" data-a="qh">New Quiz</button>
      </div></div>`;bind();return;
  }
  const q=qst.questions[qst.index],prog=(qst.index/qst.questions.length)*100;
  const opts=q.options.map((opt,i)=>{
    const correct=opt.e===q.word.e;
    let cls="option-btn"+(q.dir==="en2ar"?" arabic-opt":"");
    if(qst.selected!==null){if(correct)cls+=" correct";else if(qst.selected===i)cls+=" wrong";}
    return`<button class="${cls}" data-opt="${i}" ${qst.selected!==null?"disabled":""}>${q.dir==="ar2en"?opt.e:opt.a}</button>`;
  }).join('');
  app.innerHTML=`
    <div class="progress-bar"><div class="fill" style="width:${prog}%"></div></div>
    <div class="quiz-header"><span style="font-size:14px;color:#888">Q${qst.index+1} / ${qst.questions.length}</span><span style="font-size:14px;color:var(--teal);font-weight:700">✅ ${qst.score}</span></div>
    <div class="quiz-prompt">
      <p class="qlabel">${q.dir==="ar2en"?"What does this word mean?":"Which Arabic word is this?"}</p>
      <p class="qword ${q.dir==="ar2en"?"arabic":""}">${q.dir==="ar2en"?q.word.a:q.word.e}</p>
      ${q.dir==="ar2en"?`<p class="qtranslit">${q.word.t}</p>`:''}
    </div>
    <div class="options-grid">${opts}</div>
    <button class="btn-back" data-a="qh" style="margin-top:14px">← Back to Quiz Menu</button>`;
  bind();
}
function renderQHome(){
  const db=Array.from({length:NUM_DAYS},(_,i)=>i+1).map(d=>`<button class="day-btn" data-qd="${d}" style="font-size:12px">D${d}</button>`).join('');
  return`
    <div class="hero"><div class="hero-bg">
      <p style="color:var(--gold);font-size:18px;font-weight:700;margin-bottom:4px">📝 Quiz Yourself</p>
      <p style="color:#88BBBB;font-size:13px">Pick a category or day, then choose your style</p>
    </div></div>
    <p class="section-title">Question Style</p>
    <div class="mode-toggle">
      <button class="mode-btn ${qmode==="ar2en"?"active":""}" data-qm="ar2en">Arabic → English</button>
      <button class="mode-btn ${qmode==="en2ar"?"active":""}" data-qm="en2ar">English → Arabic</button>
      <button class="mode-btn ${qmode==="mixed"?"active":""}" data-qm="mixed">Mixed</button>
    </div>
    <p class="section-title">By Day</p>
    <div class="day-grid" style="grid-template-columns:repeat(6,1fr)">${db}</div>
    <p class="section-title">By Category</p>
    <div class="cat-pick-grid">
      <button class="cat-pick-btn gd" data-qc="all">⭐ All ${allWords.length} Words <span class="cnt">${allWords.length}</span></button>
      ${cats.map(c=>{const cnt=allWords.filter(w=>w.c===c).length;return`<button class="cat-pick-btn" data-qc="${c}">${c}<span class="cnt">${cnt}</span></button>`;}).join('')}
    </div>`;
}

// FLASHCARDS
function startF(words){
  fst={deck:shuffle(words),index:0,flipped:false,known:0};
  tab="flash";render();
}
function renderF(app){
  if(!fst.deck||!fst.deck.length){app.innerHTML=renderFHome();bind();return;}
  if(fst.index>=fst.deck.length){
    app.innerHTML=`<div class="results">
      <div class="emoji">✅</div><div class="sc">Session Done!</div>
      <p class="msg">You marked <strong>${fst.known}</strong> of <strong>${fst.deck.length}</strong> as known. MashaAllah!</p>
      <div class="btn-row">
        <button class="btn-primary" data-a="rf">Again</button>
        <button class="btn-secondary" data-a="fh">New Deck</button>
      </div></div>`;bind();return;
  }
  const w=fst.deck[fst.index],prog=(fst.index/fst.deck.length)*100;
  app.innerHTML=`
    <div class="progress-bar"><div class="fill" style="width:${prog}%"></div></div>
    <div class="quiz-header"><span style="font-size:14px;color:#888">${fst.index+1} / ${fst.deck.length}</span><span style="font-size:13px;color:var(--gold)">${w.c}</span></div>
    <div class="flashcard ${fst.flipped?"back":"front"}" data-a="flip">
      ${!fst.flipped
        ?`<p class="f-arabic arabic">${w.a}</p><p class="f-hint">Tap to reveal meaning</p>`
        :`<p class="f-english">${w.e}</p><p class="f-arabic arabic" style="font-size:36px;color:var(--teal)">${w.a}</p><p class="f-translit">${w.t}</p>${w.f?`<p class="f-freq">Appears ${w.f}× in Quran</p>`:''}`}
    </div>
    <div class="flash-actions" ${!fst.flipped?'style="opacity:0.35;pointer-events:none"':''}>
      <button class="still" data-a="fno">Still Learning</button>
      <button class="got" data-a="fyes">Got It ✓</button>
    </div>
    <button class="btn-back" data-a="fh" style="margin-top:12px">← Back to Flashcard Menu</button>`;
  bind();
}
function renderFHome(){
  const db=Array.from({length:NUM_DAYS},(_,i)=>i+1).map(d=>`<button class="day-btn" data-fd="${d}" style="font-size:12px">D${d}</button>`).join('');
  return`
    <div class="hero"><div class="hero-bg">
      <p style="color:var(--gold);font-size:18px;font-weight:700;margin-bottom:4px">🔄 Flashcards</p>
      <p style="color:#88BBBB;font-size:13px">See Arabic → think → tap to reveal</p>
    </div></div>
    <p class="section-title">By Day</p>
    <div class="day-grid" style="grid-template-columns:repeat(6,1fr)">${db}</div>
    <p class="section-title">By Category</p>
    <div class="cat-pick-grid">
      <button class="cat-pick-btn gd" data-fc="all">⭐ All ${allWords.length} Words <span class="cnt">${allWords.length}</span></button>
      ${cats.map(c=>{const cnt=allWords.filter(w=>w.c===c).length;return`<button class="cat-pick-btn" data-fc="${c}">${c}<span class="cnt">${cnt}</span></button>`;}).join('')}
    </div>`;
}

// BIND
function bind(){
  document.querySelectorAll('.nav-tab').forEach(el=>el.onclick=()=>{
    tab=el.dataset.tab;
    if(tab==="quiz"&&!qst.questions)qst={};
    if(tab==="flash"&&!fst.deck)fst={};
    render();
  });
  qs2('[data-a="sn"]',el=>el.onclick=()=>{if(si<slides.length-1){si++;render();}});
  qs2('[data-a="sp"]',el=>el.onclick=()=>{if(si>0){si--;render();}});
  document.querySelectorAll('[data-day]').forEach(el=>el.onclick=()=>{sday=parseInt(el.dataset.day);render();});
  qs2('[data-a="qday"]',el=>el.onclick=()=>startQ(getDay(sday)));
  qs2('[data-a="fday"]',el=>el.onclick=()=>startF(getDay(sday)));
  document.querySelectorAll('[data-bc]').forEach(el=>el.onclick=()=>{bcat=el.dataset.bc;render();});
  document.querySelectorAll('[data-qm]').forEach(el=>el.onclick=()=>{qmode=el.dataset.qm;document.querySelectorAll('[data-qm]').forEach(b=>b.classList.toggle('active',b.dataset.qm===qmode));});
  document.querySelectorAll('[data-qc]').forEach(el=>el.onclick=()=>startQ(el.dataset.qc==="all"?allWords:allWords.filter(w=>w.c===el.dataset.qc)));
  document.querySelectorAll('[data-qd]').forEach(el=>el.onclick=()=>startQ(getDay(parseInt(el.dataset.qd))));
  document.querySelectorAll('[data-fc]').forEach(el=>el.onclick=()=>startF(el.dataset.fc==="all"?allWords:allWords.filter(w=>w.c===el.dataset.fc)));
  document.querySelectorAll('[data-fd]').forEach(el=>el.onclick=()=>startF(getDay(parseInt(el.dataset.fd))));
  document.querySelectorAll('[data-opt]').forEach(el=>el.onclick=()=>{
    if(qst.selected!==null)return;
    const i=parseInt(el.dataset.opt),q=qst.questions[qst.index];
    qst.selected=i;if(q.options[i].e===q.word.e)qst.score++;
    renderQ(document.getElementById('app'));
    setTimeout(()=>{qst.index<qst.questions.length-1?(qst.index++,qst.selected=null):qst.finished=true;renderQ(document.getElementById('app'));},1300);
  });
  qs2('[data-a="flip"]',el=>el.onclick=()=>{fst.flipped=!fst.flipped;renderF(document.getElementById('app'));});
  qs2('[data-a="fno"]',el=>el.onclick=()=>{fst.index++;fst.flipped=false;renderF(document.getElementById('app'));});
  qs2('[data-a="fyes"]',el=>el.onclick=()=>{fst.known++;fst.index++;fst.flipped=false;renderF(document.getElementById('app'));});
  qs2('[data-a="rq"]',el=>el.onclick=()=>{qst={...qst,index:0,score:0,selected:null,finished:false,questions:shuffle(qst.questions).map(q=>({...q,options:shuffle(q.options)}))};renderQ(document.getElementById('app'));});
  qs2('[data-a="qh"]',el=>el.onclick=()=>{qst={};render();});
  qs2('[data-a="rf"]',el=>el.onclick=()=>{fst={...fst,deck:shuffle(fst.deck),index:0,flipped:false,known:0};renderF(document.getElementById('app'));});
  qs2('[data-a="fh"]',el=>el.onclick=()=>{fst={};render();});
}
function qs2(sel,fn){const el=document.querySelector(sel);if(el)fn(el);}
render();
</script>
</body>
</html>
