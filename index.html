<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Understand the Quran — Vocabulary Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#0D7377; --dark-teal:#0A5C5E; --gold:#C49A2B; --deep-gold:#A8841F;
  --cream:#FFF8E7; --dark-bg:#1A3636; --light-teal:#E0F2F1;
  --green:#2E7D32; --red:#C62828;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'IBM Plex Sans',sans-serif;background:#f0f4f4;color:#333;min-height:100vh;}
.arabic{font-family:'Amiri','Traditional Arabic',serif;direction:rtl;line-height:1.6;}

.nav-bar{position:sticky;top:0;z-index:100;background:var(--dark-bg);display:flex;overflow-x:auto;gap:2px;padding:8px 8px 0;scrollbar-width:none;}
.nav-bar::-webkit-scrollbar{display:none;}
.nav-tab{flex-shrink:0;padding:10px 14px;background:rgba(255,255,255,0.08);color:#88BBBB;border:none;cursor:pointer;border-radius:10px 10px 0 0;font-size:12px;font-weight:500;transition:all 0.2s;white-space:nowrap;}
.nav-tab.active{background:var(--gold);color:white;font-weight:700;}

.app{max-width:540px;margin:0 auto;padding:16px 14px 80px;}

/* SLIDES */
.slide{background:var(--dark-bg);border-radius:18px;padding:30px 22px;text-align:center;margin-bottom:12px;position:relative;overflow:hidden;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.slide::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(196,154,43,0.07);}
.slide .bismillah{font-family:'Amiri',serif;color:var(--gold);font-size:26px;direction:rtl;margin-bottom:10px;}
.slide-nav{display:flex;gap:10px;justify-content:center;margin-top:10px;}
.slide-nav button{padding:10px 22px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;}
.slide-nav .prev{background:#eee;color:#555;}
.slide-nav .next{background:var(--gold);color:white;}
.slide-nav button:disabled{opacity:0.35;cursor:default;}
.slide-dots{display:flex;gap:5px;justify-content:center;margin-top:8px;}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc;transition:all 0.2s;}
.dot.active{background:var(--teal);width:20px;border-radius:4px;}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;}
.stat-box{background:rgba(255,255,255,0.07);border-radius:10px;padding:12px 8px;text-align:center;}
.stat-box .num{color:var(--gold);font-size:20px;font-weight:700;line-height:1.2;}
.stat-box .lbl{color:#88BBBB;font-size:11px;margin-top:3px;line-height:1.4;}
.stat-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%;}

/* INFO CARDS */
.info-card{background:white;border-radius:14px;padding:16px;margin-bottom:10px;border-left:4px solid var(--gold);}
.info-card h3{color:var(--dark-teal);font-size:14px;margin-bottom:8px;font-weight:700;}
.info-card p{color:#555;font-size:13px;line-height:1.7;}
.info-card.teal{border-left-color:var(--teal);}

/* DAY TAB */
.day-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px;}
.day-btn{padding:9px 4px;border:2px solid #ddd;border-radius:10px;background:white;cursor:pointer;text-align:center;font-size:12px;color:#666;font-weight:500;transition:all 0.2s;}
.day-btn.active{border-color:var(--teal);background:var(--teal);color:white;font-weight:700;}
.day-words-card{background:var(--cream);border:2px solid var(--gold);border-radius:14px;padding:16px;margin-bottom:12px;}
.word-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(196,154,43,0.2);}
.word-row:last-child{border-bottom:none;}
.word-row .eng{font-size:13px;color:#333;}
.word-row .translit{font-size:11px;color:#aaa;margin-left:4px;font-style:italic;}
.word-row .arb{font-family:'Amiri',serif;font-size:24px;color:var(--teal);direction:rtl;}
.day-actions{display:flex;gap:10px;}
.day-actions button{flex:1;padding:12px;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;}
.day-actions .quiz-day{background:var(--teal);color:white;}
.day-actions .flash-day{background:var(--gold);color:white;}

/* LEARN */
.cat-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.cat-pill{padding:6px 13px;border-radius:20px;font-size:12px;cursor:pointer;border:none;font-weight:500;background:#e8f0f0;color:var(--teal);transition:all 0.15s;}
.cat-pill.active{background:var(--teal);color:white;font-weight:700;}
.browse-list{border-radius:10px;border:1px solid #e0e0e0;overflow:hidden;}
.browse-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid #f0f0f0;background:white;}
.browse-item:nth-child(even){background:#fafafa;}
.browse-item:last-child{border-bottom:none;}
.browse-item .eng-col{font-size:13px;color:#333;}
.browse-item .arb-col{font-family:'Amiri',serif;font-size:26px;color:var(--teal);direction:rtl;}

/* QUIZ */
.progress-bar{width:100%;height:5px;background:#e0e0e0;border-radius:3px;margin-bottom:12px;overflow:hidden;}
.progress-bar .fill{height:100%;background:var(--teal);border-radius:3px;transition:width 0.35s;}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 2px;}
.quiz-header .info{font-size:13px;color:#888;}
.quiz-header .score{font-size:13px;color:var(--teal);font-weight:700;}
.quiz-prompt{background:var(--dark-bg);border-radius:14px;padding:34px 20px;text-align:center;margin-bottom:14px;}
.quiz-prompt .qlabel{color:#88BBBB;font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.quiz-prompt .qword{color:var(--gold);font-size:40px;font-weight:700;line-height:1.4;}
.quiz-prompt .qword.eng{font-size:20px;direction:ltr;}
.quiz-prompt .qtranslit{color:#88BBBB;font-size:13px;font-style:italic;margin-top:6px;}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.option-btn{padding:15px 10px;border:2px solid #ddd;border-radius:12px;background:white;cursor:pointer;font-size:14px;color:#333;transition:all 0.2s;min-height:56px;display:flex;align-items:center;justify-content:center;text-align:center;}
.option-btn.arabic-opt{font-family:'Amiri',serif;font-size:26px;direction:rtl;color:var(--teal);}
.option-btn.correct{background:#E8F5E9;border-color:#4CAF50;color:var(--green);font-weight:700;}
.option-btn.wrong{background:#FFEBEE;border-color:#E53935;color:var(--red);}
.option-btn:disabled{cursor:default;}

/* FLASHCARD */
.flashcard{border-radius:18px;padding:48px 24px;text-align:center;cursor:pointer;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.3s;user-select:none;}
.flashcard.front{background:var(--dark-bg);}
.flashcard.back{background:var(--cream);border:2px solid var(--gold);}
.flashcard .f-arabic{font-family:'Amiri',serif;color:var(--gold);font-size:48px;direction:rtl;margin-bottom:10px;line-height:1.4;}
.flashcard .f-hint{color:#88BBBB;font-size:12px;}
.flashcard .f-english{color:var(--dark-teal);font-size:24px;font-weight:700;margin-bottom:8px;}
.flashcard .f-translit{color:#888;font-size:13px;font-style:italic;}
.flashcard .f-freq{color:#aaa;font-size:12px;margin-top:6px;}
.flash-actions{display:flex;gap:10px;margin-top:12px;}
.flash-actions button{flex:1;padding:13px;border:none;border-radius:12px;cursor:pointer;font-size:14px;font-weight:700;}
.flash-actions .still{background:#FFEBEE;color:var(--red);}
.flash-actions .got{background:#E8F5E9;color:var(--green);}

/* RESULTS */
.results{text-align:center;padding:34px 16px;}
.results .emoji{font-size:54px;margin-bottom:10px;}
.results .sc{color:var(--teal);font-size:32px;font-weight:700;}
.results .msg{color:#666;font-size:14px;margin:6px 0 22px;line-height:1.6;}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn-primary{padding:12px 26px;background:var(--teal);color:white;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:700;}
.btn-secondary{padding:12px 26px;background:white;color:var(--teal);border:2px solid var(--teal);border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;}
.btn-back{width:100%;padding:12px;background:#eee;color:#666;border:none;border-radius:10px;cursor:pointer;font-size:14px;margin-top:12px;}

/* PICKER */
.cat-pick-grid{display:grid;gap:8px;}
.cat-pick-btn{padding:13px 16px;border-radius:12px;cursor:pointer;font-size:13px;font-weight:500;border:2px solid var(--teal);background:white;color:var(--dark-teal);text-align:left;transition:all 0.15s;}
.cat-pick-btn.gd{background:var(--gold);color:white;border-color:var(--gold);}
.mode-toggle{display:flex;gap:8px;margin-bottom:12px;}
.mode-btn{flex:1;padding:10px;border:2px solid #ddd;border-radius:10px;cursor:pointer;font-size:12px;font-weight:500;background:white;color:#555;}
.mode-btn.active{border-color:var(--teal);background:var(--teal);color:white;font-weight:700;}
.section-title{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px;}

/* MUQATTAAT */
.mq-card{background:white;border-radius:14px;padding:16px;margin-bottom:10px;border-left:4px solid var(--gold);box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.surah-pill{display:inline-block;background:#e8f0f0;color:var(--teal);border-radius:20px;padding:3px 10px;font-size:12px;margin:3px 3px 0 0;font-weight:500;}
</style>
</head>

function render(){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===activeTab));
  const app=document.getElementById('app');
  if(activeTab==="present"){ app.innerHTML=renderPresent(); }
  else if(activeTab==="days"){ app.innerHTML=renderDays(); }
  else if(activeTab==="learn"){ app.innerHTML=renderLearn(); }
  else if(activeTab==="muqattaat"){ app.innerHTML=renderMuqattaat(); }
  else if(activeTab==="quiz"){ renderQuizView(app); }
  else if(activeTab==="flash"){ renderFlashView(app); }
  bindAll();
}

    `<button class="day-btn ${d===selectedDay?'active':''}" data-day="${d}">Day ${d}</button>`
  ).join('');
  const words=getWordsByDay(selectedDay);
  const rows=words.map(w=>`
    <div class="word-row">
      <div><span class="eng">${w.english}</span><span class="translit">(${w.t})</span></div>
      <span class="arb arabic">${w.arabic}</span>
    </div>`).join('');
  return `
    <div style="background:var(--dark-bg);border-radius:14px;padding:14px;margin-bottom:14px;text-align:center">
      <p style="color:var(--gold);font-size:13px;font-weight:700;letter-spacing:1px">30-DAY QURʾĀNIC VOCABULARY PLAN</p>
      <p style="color:#88BBBB;font-size:12px;margin-top:3px">5 words per day · Pick any day to begin</p>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <h3 style="color:var(--dark-teal);font-size:15px;font-weight:700">Choose a Day</h3>
      <span style="font-size:12px;color:#aaa">Day ${selectedDay} selected</span>
    </div>
    <div class="day-grid">${dayBtns}</div>
    <div class="day-words-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="color:var(--dark-teal);font-size:14px;font-weight:700">Day ${selectedDay} — 5 Words</span>
        <span style="background:var(--gold);color:white;font-size:11px;padding:3px 10px;border-radius:12px">Day ${selectedDay}</span>
      </div>
      ${rows}
    </div>
    <div class="day-actions">
      <button class="quiz-day" data-action="quizDay">📝 Quiz These Words</button>
      <button class="flash-day" data-action="flashDay">🔄 Flashcards</button>
    </div>`;
}

// ============================================================
//  LEARN
// ============================================================
function renderLearn(){
  const pills=cats.map(c=>`<button class="cat-pill ${c===browseCat?'active':''}" data-browsecat="${c}">${c}</button>`).join('');
  const items=allWords.filter(w=>w.cat===browseCat).map(w=>`
    <div class="browse-item">
      <div>
        <div class="eng-col">${w.english}</div>
        <div style="font-size:11px;color:#aaa;font-style:italic">${w.t}${w.freq?` · ${w.freq}× in Quran`:''}</div>
      </div>
      <span class="arb-col arabic">${w.arabic}</span>
    </div>`).join('');
  const count=allWords.filter(w=>w.cat===browseCat).length;
  return `
    <div style="background:white;border-radius:12px;padding:12px;margin-bottom:12px;border:1px solid #e0e0e0">
      <p style="font-size:12px;color:#888;margin-bottom:8px;font-weight:700">BROWSE BY CATEGORY — ${count} words</p>
      <div class="cat-pills">${pills}</div>
    </div>
    <div class="browse-list">${items}</div>`;
}

// ============================================================
//  MUQATTAAT
// ============================================================
function renderMuqattaat(){
  const cards=muqattaat.map(m=>`
    <div class="mq-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <p style="font-size:13px;font-weight:700;color:var(--dark-teal)">${m.name}</p>
          <p style="font-size:11px;color:#aaa;margin-top:2px">Appears in ${m.surahs.length} Surah${m.surahs.length>1?'s':''}</p>
        </div>
        <span class="arabic" style="font-size:34px;color:var(--gold);line-height:1.4">${m.arabic}</span>
      </div>
      <div>${m.surahs.map(s=>`<span class="surah-pill">${s.n}. ${s.name}</span>`).join('')}</div>
    </div>`).join('');
  return `
    <div style="background:var(--dark-bg);border-radius:14px;padding:18px;text-align:center;margin-bottom:14px">
      <p class="arabic" style="color:var(--gold);font-size:28px;margin-bottom:6px">الحروف المقطعة</p>
      <p style="color:white;font-size:15px;font-weight:600;margin-bottom:4px">Ḥurūf Muqaṭṭaʿāt</p>
      <p style="color:#88BBBB;font-size:12px;line-height:1.7">The 14 "mysterious letters" opening 29 Surahs.<br>Allah alone knows their full meaning.</p>
    </div>
    <div class="info-card" style="border-left-color:var(--teal);margin-bottom:14px">
      <h3>📌 Key Facts</h3>
      <p>
        • Each letter earns <strong>10 rewards</strong> when recited (Tirmidhi)<br>
        • They appear at the start of <strong>29 out of 114</strong> Surahs<br>
        • They are recited by letter name: <strong>Alif · Lam · Mim</strong> (3 letters, 30 rewards)<br>
        • They prove the Quran's miraculous nature — Arabs knew these letters but couldn't produce anything like the Quran<br>
        • Scholars have 40+ opinions on their meaning; the safest position is to believe in them and recite them with tawakkul
      </p>
    </div>
    ${cards}`;
}

// ============================================================
//  QUIZ
// ============================================================
function startQuiz(words){
  const pool=shuffle(words).slice(0,Math.min(10,words.length));
  quizState={
    questions:pool.map(w=>{
      const dir=quizMode==="mixed"?(Math.random()>0.5?"ar2en":"en2ar"):quizMode;
      return {word:w,options:shuffle([w,...shuffle(allWords.filter(x=>x.english!==w.english)).slice(0,3)]),dir};
    }),
    index:0,score:0,selected:null,finished:false
  };
  activeTab="quiz"; render();
}

function renderQuizView(app){
  if(!quizState.questions||!quizState.questions.length){ app.innerHTML=renderQuizHome(); bindAll(); return; }
  if(quizState.finished){
    const pct=quizState.score/quizState.questions.length;
    app.innerHTML=`
      <div class="results">
        <div class="emoji">${pct>=0.8?"🌟":pct>=0.5?"👍":"📖"}</div>
        <div class="sc">${quizState.score} / ${quizState.questions.length}</div>
        <p class="msg">${pct>=0.8?"MashaAllah! Excellent!":pct>=0.5?"Good effort — keep going!":"Keep reviewing, inshaAllah you'll get there!"}</p>
        <div class="btn-row">
          <button class="btn-primary" data-action="retryQuiz">Retry</button>
          <button class="btn-secondary" data-action="quizHome">New Quiz</button>
        </div>
      </div>`; bindAll(); return;
  }
  const q=quizState.questions[quizState.index];
  const prog=(quizState.index/quizState.questions.length)*100;
  const opts=q.options.map((opt,i)=>{
    const correct=opt.english===q.word.english;
    let cls="option-btn"+(q.dir==="en2ar"?" arabic-opt":"");
    if(quizState.selected!==null){ if(correct) cls+=" correct"; else if(quizState.selected===i) cls+=" wrong"; }
    return `<button class="${cls}" data-option="${i}" ${quizState.selected!==null?"disabled":""}>${q.dir==="ar2en"?opt.english:opt.arabic}</button>`;
  }).join('');
  app.innerHTML=`
    <div class="progress-bar"><div class="fill" style="width:${prog}%"></div></div>
    <div class="quiz-header"><span class="info">Q${quizState.index+1} / ${quizState.questions.length}</span><span class="score">✅ ${quizState.score}</span></div>
    <div class="quiz-prompt">
      <p class="qlabel">${q.dir==="ar2en"?"What does this mean?":"Which Arabic word is this?"}</p>
      <p class="qword ${q.dir==="ar2en"?"arabic":""}">${q.dir==="ar2en"?q.word.arabic:q.word.english}</p>
      ${q.dir==="ar2en"?`<p class="qtranslit">${q.word.t}</p>`:''}
    </div>
    <div class="options-grid">${opts}</div>
    <button class="btn-back" data-action="quizHome" style="margin-top:14px">← Back to Quiz Menu</button>`;
  bindAll();
}

function renderQuizHome(){
  const dayBtns=Array.from({length:NUM_DAYS},(_,i)=>i+1).map(d=>
    `<button class="day-btn" data-quizday="${d}" style="font-size:11px">D${d}</button>`).join('');
  return `
    <div style="background:var(--dark-bg);border-radius:14px;padding:16px;text-align:center;margin-bottom:14px">
      <p style="color:var(--gold);font-size:17px;font-weight:700;margin-bottom:4px">📝 Quiz Yourself</p>
      <p style="color:#88BBBB;font-size:12px">Choose a category or day, then pick your question style</p>
    </div>
    <p class="section-title">Question Style</p>
    <div class="mode-toggle">
      <button class="mode-btn ${quizMode==="ar2en"?"active":""}" data-qmode="ar2en">Arabic → English</button>
      <button class="mode-btn ${quizMode==="en2ar"?"active":""}" data-qmode="en2ar">English → Arabic</button>
      <button class="mode-btn ${quizMode==="mixed"?"active":""}" data-qmode="mixed">Mixed</button>
    </div>
    <p class="section-title">Quiz by Day</p>
    <div class="day-grid" style="grid-template-columns:repeat(6,1fr)">${dayBtns}</div>
    <p class="section-title">Quiz by Category</p>
    <div class="cat-pick-grid">
      <button class="cat-pick-btn gd" data-quizcat="all">⭐ All ${allWords.length} Words</button>
      ${cats.map(c=>{const cnt=allWords.filter(w=>w.cat===c).length;
        return `<button class="cat-pick-btn" data-quizcat="${c}">${c} <span style="float:right;color:#aaa;font-size:11px">${cnt}</span></button>`;
      }).join('')}
    </div>`;
}

// ============================================================
//  FLASHCARDS
// ============================================================
function startFlash(words){
  flashState={deck:shuffle(words),index:0,flipped:false,known:0};
  activeTab="flash"; render();
}

function renderFlashView(app){
  if(!flashState.deck||!flashState.deck.length){ app.innerHTML=renderFlashHome(); bindAll(); return; }
  if(flashState.index>=flashState.deck.length){
    app.innerHTML=`
      <div class="results">
        <div class="emoji">✅</div>
        <div class="sc">Session Done!</div>
        <p class="msg">You marked <strong>${flashState.known}</strong> of <strong>${flashState.deck.length}</strong> as known. MashaAllah!</p>
        <div class="btn-row">
          <button class="btn-primary" data-action="retryFlash">Shuffle Again</button>
          <button class="btn-secondary" data-action="flashHome">New Deck</button>
        </div>
      </div>`; bindAll(); return;
  }
  const w=flashState.deck[flashState.index];
  const prog=(flashState.index/flashState.deck.length)*100;
  app.innerHTML=`
    <div class="progress-bar"><div class="fill" style="width:${prog}%"></div></div>
    <div class="quiz-header"><span class="info">${flashState.index+1} / ${flashState.deck.length}</span><span class="score" style="color:var(--gold)">${w.cat}</span></div>
    <div class="flashcard ${flashState.flipped?"back":"front"}" data-action="flipCard">
      ${!flashState.flipped?`<p class="f-arabic arabic">${w.arabic}</p><p class="f-hint">Tap to reveal meaning</p>`
      :`<p class="f-english">${w.english}</p><p class="f-arabic arabic" style="font-size:34px;color:var(--teal)">${w.arabic}</p><p class="f-translit">${w.t}</p>${w.freq?`<p class="f-freq">Appears ${w.freq}× in Quran</p>`:''}`}
    </div>
    <div class="flash-actions" ${!flashState.flipped?'style="opacity:0.35;pointer-events:none"':''}>
      <button class="still" data-action="flashLearning">Still Learning</button>
      <button class="got" data-action="flashGotIt">Got It ✓</button>
    </div>
    <button class="btn-back" data-action="flashHome" style="margin-top:12px">← Back to Flashcard Menu</button>`;
  bindAll();
}

function renderFlashHome(){
  const dayBtns=Array.from({length:NUM_DAYS},(_,i)=>i+1).map(d=>
    `<button class="day-btn" data-flashday="${d}" style="font-size:11px">D${d}</button>`).join('');
  return `
    <div style="background:var(--dark-bg);border-radius:14px;padding:16px;text-align:center;margin-bottom:14px">
      <p style="color:var(--gold);font-size:17px;font-weight:700;margin-bottom:4px">🔄 Flashcards</p>
      <p style="color:#88BBBB;font-size:12px">See Arabic → think → reveal meaning</p>
    </div>
    <p class="section-title">By Day</p>
    <div class="day-grid" style="grid-template-columns:repeat(6,1fr)">${dayBtns}</div>
    <p class="section-title">By Category</p>
    <div class="cat-pick-grid">
      <button class="cat-pick-btn gd" data-flashcat="all">⭐ All ${allWords.length} Words</button>
      ${cats.map(c=>{const cnt=allWords.filter(w=>w.cat===c).length;
        return `<button class="cat-pick-btn" data-flashcat="${c}">${c} <span style="float:right;color:#aaa;font-size:11px">${cnt}</span></button>`;
      }).join('')}
    </div>`;
}

// ============================================================
//  BIND ALL
// ============================================================
function bindAll(){
  document.querySelectorAll('.nav-tab').forEach(el=>{
    el.onclick=()=>{ activeTab=el.dataset.tab; if(activeTab==="quiz"&&!quizState.questions) quizState={}; if(activeTab==="flash"&&!flashState.deck) flashState={}; render(); };
  });
  qs('[data-action="slideNext"]',el=>el.onclick=()=>{ if(slideIdx<slides.length-1){slideIdx++;render();} });
  qs('[data-action="slidePrev"]',el=>el.onclick=()=>{ if(slideIdx>0){slideIdx--;render();} });
  document.querySelectorAll('[data-day]').forEach(el=>el.onclick=()=>{ selectedDay=parseInt(el.dataset.day); render(); });
  qs('[data-action="quizDay"]',el=>el.onclick=()=>startQuiz(getWordsByDay(selectedDay)));
  qs('[data-action="flashDay"]',el=>el.onclick=()=>startFlash(getWordsByDay(selectedDay)));
  document.querySelectorAll('[data-browsecat]').forEach(el=>el.onclick=()=>{ browseCat=el.dataset.browsecat; render(); });
  document.querySelectorAll('[data-qmode]').forEach(el=>el.onclick=()=>{ quizMode=el.dataset.qmode; document.querySelectorAll('[data-qmode]').forEach(b=>b.classList.toggle('active',b.dataset.qmode===quizMode)); });
  document.querySelectorAll('[data-quizcat]').forEach(el=>el.onclick=()=>startQuiz(el.dataset.quizcat==="all"?allWords:allWords.filter(w=>w.cat===el.dataset.quizcat)));
  document.querySelectorAll('[data-quizday]').forEach(el=>el.onclick=()=>startQuiz(getWordsByDay(parseInt(el.dataset.quizday))));
  document.querySelectorAll('[data-flashcat]').forEach(el=>el.onclick=()=>startFlash(el.dataset.flashcat==="all"?allWords:allWords.filter(w=>w.cat===el.dataset.flashcat)));
  document.querySelectorAll('[data-flashday]').forEach(el=>el.onclick=()=>startFlash(getWordsByDay(parseInt(el.dataset.flashday))));
  document.querySelectorAll('[data-option]').forEach(el=>el.onclick=()=>{
    if(quizState.selected!==null) return;
    const i=parseInt(el.dataset.option), q=quizState.questions[quizState.index];
    quizState.selected=i;
    if(q.options[i].english===q.word.english) quizState.score++;
    renderQuizView(document.getElementById('app'));
    setTimeout(()=>{ quizState.index<quizState.questions.length-1?(quizState.index++,quizState.selected=null):quizState.finished=true; renderQuizView(document.getElementById('app')); },1300);
  });
  qs('[data-action="flipCard"]',el=>el.onclick=()=>{ flashState.flipped=!flashState.flipped; renderFlashView(document.getElementById('app')); });
  qs('[data-action="flashLearning"]',el=>el.onclick=()=>{ flashState.index++;flashState.flipped=false; renderFlashView(document.getElementById('app')); });
  qs('[data-action="flashGotIt"]',el=>el.onclick=()=>{ flashState.known++;flashState.index++;flashState.flipped=false; renderFlashView(document.getElementById('app')); });
  qs('[data-action="retryQuiz"]',el=>el.onclick=()=>{ quizState={...quizState,index:0,score:0,selected:null,finished:false,questions:shuffle(quizState.questions).map(q=>({...q,options:shuffle(q.options)}))}; renderQuizView(document.getElementById('app')); });
  qs('[data-action="quizHome"]',el=>el.onclick=()=>{ quizState={}; render(); });
  qs('[data-action="retryFlash"]',el=>el.onclick=()=>{ flashState={...flashState,deck:shuffle(flashState.deck),index:0,flipped:false,known:0}; renderFlashView(document.getElementById('app')); });
  qs('[data-action="flashHome"]',el=>el.onclick=()=>{ flashState={}; render(); });
}

function qs(sel,fn){ const el=document.querySelector(sel); if(el) fn(el); }

render();
</script>
</body>
</html>
